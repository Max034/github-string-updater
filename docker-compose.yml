services:
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "3000:80"

volumes:
  backend_node_modules: